name: Auto Crawl Stock Chips

on:
  schedule:
    # Runs every 30 minutes from 07:00 to 14:00 UTC (15:00 to 22:00 Taiwan Time) Monday to Friday
    # This high frequency helps overcome the scheduling delays of free GitHub Actions runner queues.
    - cron: '*/30 7,8,9,10,11,12,13,14 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Crawler Script
        run: |
          python cron_crawler.py || echo "Stock chips crawler skipped or no new data."
          python tsmc-news/crawler_daemon.py once || echo "TSMC news crawler skipped or failed."

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ tsmc-news/data/
          if git diff --staged --quiet; then
            echo "No changes in crawled stock chips and news data."
          else
            git commit -m "auto(data): update daily stock chips and TSMC news for $(date +'%Y-%m-%d')"
            git push
          fi
